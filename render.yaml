databases:
  - name: trauto-postgres
    databaseName: trauto
    user: trauto_user
    plan: basic-1gb

services:
  - type: web
    name: trauto-web
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start_web.sh
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"
      - key: APP_ENV
        value: production
      - key: SERVICE_NAME
        value: trauto-web
      - key: WORKER_NAME
        value: main-worker
      - key: DATABASE_URL
        fromDatabase:
          name: trauto-postgres
          property: connectionString
      - key: STRICT_ENV_VALIDATION
        value: "true"
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"
      - key: PAPER_TRADING
        value: "false"
      - key: WORKER_ENABLE_TRADING
        value: "false"
      - key: LIVE_TRADING
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://trauto.onrender.com"
      - key: AUTH_SESSION_SECRET
        sync: false
      - key: AUTH_PASSWORD_PEPPER
        sync: false
      - key: AUTH_BOOTSTRAP_ADMIN_ON_STARTUP
        value: "false"
      - key: KILL_SWITCH_ON_STARTUP
        value: "false"

  - type: worker
    name: trauto-worker
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start_worker.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"
      - key: APP_ENV
        value: production
      - key: SERVICE_NAME
        value: trauto-worker
      - key: WORKER_NAME
        value: main-worker
      - key: DATABASE_URL
        fromDatabase:
          name: trauto-postgres
          property: connectionString
      - key: STRICT_ENV_VALIDATION
        value: "true"
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"
      - key: PAPER_TRADING
        value: "false"
      - key: WORKER_ENABLE_TRADING
        value: "false"
      - key: LIVE_TRADING
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://trauto.onrender.com"
      - key: AUTH_SESSION_SECRET
        sync: false
      - key: AUTH_PASSWORD_PEPPER
        sync: false
      - key: AUTH_BOOTSTRAP_ADMIN_ON_STARTUP
        value: "false"
      - key: KILL_SWITCH_ON_STARTUP
        value: "false"
      - key: WORKER_POLL_SECONDS
        value: "60"
